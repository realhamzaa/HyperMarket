name: hyper_pro
description: نظام إدارة سوبرماركت احترافي - Clean Architecture
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management - Riverpod
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Functional Programming
  fpdart: ^1.1.0

  # Routing
  go_router: ^14.2.7

  # Network
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1
  connectivity_plus: ^6.0.5

  # Local Storage - Drift
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.2.3

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Localization
  easy_localization: ^3.0.7

  # UI/UX
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1

  # QR Scanner
  mobile_scanner: ^5.1.1

  # Image Picker
  image_picker: ^1.1.2

  # Permissions
  permission_handler: ^11.3.1

  # Forms (UPDATED to fix intl conflict)
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0

  # Icons
  cupertino_icons: ^1.0.8

  # Logging
  logger: ^2.3.0

  # Utils
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  very_good_analysis: ^6.0.0

  # Code Generation
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  drift_dev: ^2.18.0

  # Testing
  mocktail: ^1.0.4

  # App Icons & Splash
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#6C5CE7"
  adaptive_icon_foreground: assets/icon/app_icon_app_foreground.png

flutter_native_splash:
  color: "#0F0F1E"
  image: assets/splash/splash_logo.png
  android: true
  ios: true
  android_12:
    color: "#0F0F1E"
    image: assets/splash/splash_logo.png

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/images/
    - assets/icon/
    - assets/splash/
    - assets/fonts/

  fonts:
    - family: iPhoneFont
      fonts:
        - asset: assets/fonts/iphone_font.ttf
          weight: 700
