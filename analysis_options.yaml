include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"
  
  errors:
    invalid_annotation_target: ignore
    todo: ignore

linter:
  rules:
    # إضافات مخصصة
    always_use_package_imports: true
    avoid_print: true
    prefer_single_quotes: true
    sort_pub_dependencies: true
    
    # RTL Support
    directives_ordering: true
